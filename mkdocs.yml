docs_dir: docs
site_dir: site

site_name: GPUCTL - AI GPU Scheduling Tool
site_url: https://runwhere-ai.github.io/gpuctl
site_description: 面向算法工程师的 AI 算力调度平台，通过声明式 YAML 和简单 CLI 命令高效管理 GPU 资源
site_author: GPU Control Team
repo_url: https://github.com/runwhere-ai/gpuctl
repo_name: runwhere-ai/gpuctl
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/gpuctl_logo.svg
  favicon: assets/gpuctl_logo.svg
  icon:
    logo: material/cpu-64-bit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: white
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: white
      accent: white
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

plugins:
  - search:
      lang:
        - zh
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
          site_name: GPUCTL - AI 算力调度工具
          nav_translations:
            Home: 首页
            User Guide: 用户指南
            Overview: 概览
            Quickstart: 快速开始
            Training Jobs: 训练任务
            Inference Services: 推理服务
            Notebook: Notebook
            Compute Jobs: 计算任务
            Resource Pool: 资源池管理
            Quota Management: 配额管理
            Developer Guide: 开发者指南
            Architecture: 系统架构
            REST API: REST API
            Contributing: 贡献指南
            CLI Reference: CLI 参考
            Community: 社区

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Overview: user-guide/index.md
    - Quickstart: user-guide/quickstart.md
    - Training Jobs: user-guide/training.md
    - Inference Services: user-guide/inference.md
    - Notebook: user-guide/notebook.md
    - Compute Jobs: user-guide/compute.md
    - Resource Pool: user-guide/pool.md
    - Quota Management: user-guide/quota.md
  - Developer Guide:
    - Overview: developer-guide/index.md
    - Architecture: developer-guide/architecture.md
    - REST API: developer-guide/api.md
    - Contributing: developer-guide/contributing.md
  - CLI Reference: cli/index.md
  - Community: community/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/runwhere-ai/gpuctl
      name: GitHub
  analytics:
    provider: google
    property: G-XXXXXXXXXX

copyright: Copyright &copy; 2025 GPU Control Team - MIT License
